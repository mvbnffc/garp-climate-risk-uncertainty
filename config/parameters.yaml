# =============================================================================
# Climate Risk Uncertainty — Master Configuration
# =============================================================================

# --- Data source ---
data:
  source: "CFRF/GARP Benchmarking Study 2025"
  scenario: "RP200_2030_defended_combined"
  n_vendors: 13
  n_properties: 100
  raw_file: "data/raw/cfrf_garp_defended_flood.csv"

# --- Distribution fitting (Notebook 01) ---
distribution_fitting:

  # Properties where all vendors report zero damage
  # Excluded from uncertainty fitting; re-added at portfolio stage as point mass at 0
  zero_damage_handling: "exclude_and_readd"

  # Quantile interpretation of min/max across vendors
  # We test multiple interpretations:
  #   "order_statistic" — min/max are expected extremes of 13 draws from the true distribution
  #   "quantile_approx" — treat as 1/(k+1) and k/(k+1) quantiles, k=13
  #   "extremes"        — treat as true support bounds (most conservative spread)
  quantile_interpretations:
    order_statistic:
      description: "Min/max as expected order statistics of 13 vendor draws"
      lower_quantile: 0.0538  # E[U_(1:13)] = 1/14
      upper_quantile: 0.9462  # E[U_(13:13)] = 13/14
    quantile_approx:
      description: "Min/max as approximate percentiles"
      lower_quantile: 0.071   # 1/(13+1)
      upper_quantile: 0.929   # 13/(13+1)
    extremes:
      description: "Min/max as true support bounds (widest interpretation)"

  # Distribution families to fit
  distributions:
    beta:
      enabled: true
      description: "Beta distribution on [0,1], fitted via quantile matching"
      fitting_method: "quantile_matching"
    triangular:
      enabled: true
      description: "Triangular distribution, mode derived from mean"
      fitting_method: "moment_matching"
    uniform:
      enabled: true
      description: "Uniform on [min, max] — maximum-entropy / most dispersed"
      fitting_method: "direct"

# --- Portfolio construction (Notebook 02) ---
portfolio:
  n_loans: 100    # 1:1 with CFRF properties for now

  # LTV at origination — primary state variable for credit risk
  # UK residential mortgages: 60–95% LTV at origination
  # UK CRE: 50–75%
  ltv_origination:
    distribution: "uniform"
    params: {low: 0.60, high: 0.90}

  # Property value per loan (£m)
  property_value:
    distribution: "lognormal"
    params: {mu: -0.2, sigma: 0.5}    # median ~£0.8m, range ~£0.3m–£2m

  # EAD derived structurally: EAD_i = LTV_i * PV_i
  # No separate EAD distribution needed in LTV-based model.

  maturity:
    distribution: "uniform_int"
    params: {low: 5, high: 25}        # years

  # --- Only used by reduced-form sensitivity model ---
  ead:
    distribution: "uniform"
    params: {low: 0.5, high: 5.0}     # £m (for reduced-form model)
  baseline_pd_12m:
    distribution: "lognormal"
    params: {mu: -5.5, sigma: 0.8}    # median ~0.4% (for reduced-form model)
  baseline_lgd:
    distribution: "uniform"
    params: {low: 0.20, high: 0.45}   # (for reduced-form model)

  random_seed: 42

# --- Credit risk mapping (Decision 1) ---
decision1_credit_risk:

  # =========================================================================
  # PRIMARY MODEL: LTV-based structural transmission
  # =========================================================================
  #
  # Grounded in the standard mortgage/secured lending credit risk literature.
  #
  # References:
  #   Deng, Quigley & Van Order (2000), Econometrica — option-theoretic default
  #   Campbell & Cocco (2015), J. Financial Economics — structural LTV/LTI model
  #   Qi & Yang (2009), J. Banking & Finance — LTV as primary LGD determinant
  #   Bhutta, Dokko & Shan (2017), Rev. Financial Studies — depth of negative equity
  #   Shleifer & Vishny (1992), J. Finance — fire-sale discounts on collateral
  #   Lekkas, Quigley & Van Order (1993), Real Estate Economics — LTV and loss severity
  #   Ferretti et al. (2023), J. Financial Econometrics — logistic PD specification
  #   Leow & Mues (2012), Int. J. Forecasting — LGD for UK mortgage data
  #
  # Transmission chain:
  #   damage_ratio (d)
  #     → property_value: PV(d) = PV_0 * (1 - d)
  #     → current_LTV:    LTV(d) = LTV_0 / (1 - d)
  #     → PD_12m:          logistic function of LTV(d)
  #     → LGD:             collateral shortfall net of workout costs
  #     → PD_LT:           1 - (1 - PD_12m)^T
  #     → SICR:            PD_adj_LT / PD_LT_baseline > tau
  #     → ECL:             stage-dependent provision
  #
  # Two probability framings (controlled by flood_hazard.annual_probability):
  #   Conditional   (p=1.0):  PD_adj = PD_stressed  — flood certain
  #   Unconditional (p=0.005): PD_adj = (1-p)*PD_base + p*PD_stressed  — flood probabilistic
  #
  # Key structural property: PD and LGD are driven by the SAME state variable
  # (current LTV), creating a coherent and empirically grounded transmission.
  # Nonlinearity in PD as a function of d emerges from the model structure
  # (1/(1-d) LTV transformation composed with the logistic) rather than being
  # imposed by an arbitrary functional form.
  # =========================================================================

  transmission_model: "ltv_structural"  # "ltv_structural" or "reduced_form"

  ltv_structural:

    # --- PD: logistic function of current LTV ---
    #
    # PD_12m(d) = 1 / (1 + exp(-(beta_0 + beta_1 * LTV(d))))
    #
    # where LTV(d) = LTV_0 / (1 - d)
    #
    # Calibration targets (from literature):
    #   LTV = 0.70 → PD_12m ≈ 0.2–0.5% (Moody's IG default rate)
    #   LTV = 1.10 → PD_12m ≈ 5–10%    (Bhutta et al. 2017; Campbell & Cocco 2015)
    #   LTV = 1.30 → PD_12m ≈ 15–25%
    #
    # With beta_0 = -11.5, beta_1 = 8.0:
    #   LTV=0.70 → PD ≈ 0.27%   LTV=0.80 → PD ≈ 0.61%
    #   LTV=0.90 → PD ≈ 1.34%   LTV=1.00 → PD ≈ 2.93%
    #   LTV=1.10 → PD ≈ 6.30%   LTV=1.30 → PD ≈ 24.97%

    beta_0: -11.5    # logistic intercept (controls baseline PD level)
    beta_1: 8.0      # logistic slope (controls PD sensitivity to LTV changes)

    # --- LGD: collateral shortfall net of workout costs ---
    #
    # LGD(d) = max(1 - (1 - d) * (1 - omega) / LTV_0, 0)
    #
    # Equivalently: LGD = max(1 - PV(d)*(1-omega) / EAD, 0)
    #
    # omega captures foreclosure costs, legal fees, property condition
    # degradation, time-to-sale discount, fire-sale discount.
    #
    # Literature estimates:
    #   Qi & Yang (2009): effective discounts 20–35% for high-LTV mortgages
    #   Shleifer & Vishny (1992): theoretical basis for fire-sale discounts
    #   Pennington-Cross (2006): 20–30% in normal markets
    #
    # Example at baseline LTV_0=0.75, omega=0.25:
    #   d=0.00 → LGD = max(1 - 0.75/0.75, 0) = 0%  (but omega applies)
    #              LGD = max(1 - 1.00*0.75/0.75, 0) = 0%
    #   d=0.10 → LGD = max(1 - 0.90*0.75/0.75, 0) = max(1-0.90*1.00, 0) = 10%
    #   Actually: LGD = max(1 - (1-d)*(1-omega)/LTV_0, 0)
    #   d=0.00 → LGD = max(1 - 1.00*0.75/0.75, 0) = max(1-1.00, 0) = 0%
    #   d=0.10 → LGD = max(1 - 0.90*0.75/0.75, 0) = max(1-0.90, 0) = 10%
    #   d=0.30 → LGD = max(1 - 0.70*0.75/0.75, 0) = max(1-0.70, 0) = 30%
    #   d=0.50 → LGD = max(1 - 0.50*0.75/0.75, 0) = max(1-0.50, 0) = 50%
    #
    # Note: the formula simplifies to LGD ≈ max(d + omega*(1-d) + (LTV_0-1)/LTV_0, 0)
    # when LTV_0 < 1, but the full form is clearer.

    omega: 0.25       # workout/fire-sale discount (25%)

  # =========================================================================
  # SENSITIVITY MODEL: Reduced-form (ad hoc) transmission
  # =========================================================================
  # Kept as a robustness check. Uses independent PD and LGD functions
  # of the damage ratio without structural microfoundation.
  #
  # PD_12m(d) = PD_0 * exp(alpha * d)
  # LGD(d) = min(LGD_0 + lambda * d, 1)
  #
  # Baseline PD_0 and LGD_0 drawn from portfolio distributions above.
  # =========================================================================

  reduced_form:
    pd_functional_form: "linear"  # "exponential": PD_0 * exp(α*d)  |  "linear": PD_0 * (1 + α*d)
    alpha: 2.0          # PD sensitivity to damage ratio
    lambda_lgd: 0.25    # LGD sensitivity to damage ratio

  # --- IFRS 9 staging (common to both models) ---
  sicr_threshold: 2.0  # SICR if PD_LT(d) / PD_LT_baseline > tau (EBA benchmark)

  # --- Lifetime PD (common to both models) ---
  # PD_LT = 1 - (1 - PD_12m)^T
  # Assumes period-to-period independence (noted as simplification).

  # --- ECL calculation (common to both models) ---
  ecl_method: "simple"  # "simple" or "discounted_marginal"
  discount_rate: 0.03   # only used if ecl_method == "discounted_marginal"

  # --- Flood hazard ---
  #
  # The CFRF/GARP data is for the 1-in-200 year return period event.
  # The annual exceedance probability enters the unconditional framing:
  #
  #   Conditional   — assumes the flood definitely occurs; p_flood = 1.0
  #                   isolates the vendor disagreement effect cleanly
  #
  #   Unconditional — weights by flood probability; p_flood = 1/return_period
  #                   gives the expected ECL uplift a bank would actually book
  #
  # Lifetime flood probability varies per loan: p_LT = 1 - (1 - p)^T
  #   T=5y  → p_LT = 2.5%
  #   T=10y → p_LT = 4.9%
  #   T=20y → p_LT = 9.5%
  #   T=25y → p_LT = 11.8%
  #
  flood_hazard:
    return_period: 200          # years (1-in-200 year event)
    annual_probability: 0.005   # = 1 / return_period

  # --- Simulation ---
  n_simulations: 10000
  correlation_scenarios:
    - "independent"            # independent vendor draws across properties
    - "perfectly_correlated"   # single quantile draw for all properties
  random_seed: 123

  # --- Sensitivity ranges ---
  sensitivity:
    # LTV-structural model parameters
    beta_0_range: [-13.0, -12.0, -11.5, -11.0, -10.5]
    beta_1_range: [6.0, 7.0, 8.0, 9.0, 10.0]
    omega_range: [0.15, 0.20, 0.25, 0.30, 0.35]
    ltv_origination_range: [0.60, 0.70, 0.75, 0.80, 0.85, 0.90]
    # Reduced-form model parameters
    alpha_range: [0.5, 1.0, 2.0, 3.0, 5.0]
    lambda_range: [0.1, 0.25, 0.5, 0.75]
    # Common to both models
    sicr_threshold_range: [1.5, 2.0, 2.5, 3.0]
